[project]
name = "table-maintenance-backend"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "fastapi[standard]>=0.115",
    "kubernetes>=32.0",
    "jobs",
]

[tool.uv.sources]
jobs = { path = "../jobs", editable = true }

[dependency-groups]
dev = [
    "pytest>=8",
    "httpx>=0.27",
    "pytest-mock>=3",
    "ty>=0.0.27",
]

[tool.setuptools.packages.find]
include = ["models*", "k8s*", "api*"]

[tool.ty.environment]
extra-paths = ["../jobs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
