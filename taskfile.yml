# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

output:
  group:
    begin: '::group::{{.TASK}}'
    end: '::endgroup::'

includes:
  dev-env:
    taskfile: ./tasks/dev-env.yml
    dir: '{{.ROOT_DIR}}'
  checks:
    taskfile: ./tasks/checks.yml
    dir: '{{.ROOT_DIR}}'
  cluster:
    taskfile: ./tasks/cluster.yml
    dir: '{{.ROOT_DIR}}'
  apps:
    taskfile: ./tasks/apps.yml
    dir: '{{.ROOT_DIR}}'
  trino:
    taskfile: ./tasks/trino.yml
    dir: '{{.ROOT_DIR}}'
  docs:
    taskfile: ./tasks/docs.yml
    dir: '{{.ROOT_DIR}}'

tasks:
  default:
    desc: Display available tasks
    cmds:
      - task --list
    silent: true

  pre-pr:
    desc: "Run all checks before creating a PR"
    cmds:
      - task: checks:lint
      - task: checks:test
      - task: checks:arch

  pre-commit:
    desc: "Run pre commit checks"
    cmds:
      - task: checks:lint

  unit-test:
    desc: "Run all unit tests in parallel"
    cmds:
      - task: checks:test

  serve-docs:
    desc: Serve docs locally
    cmds:
      - task: docs:serve
