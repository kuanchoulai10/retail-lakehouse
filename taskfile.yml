# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

output:
  group:
    begin: '::group::{{.TASK}}'
    end: '::endgroup::'

tasks:
  default:
    desc: Display available tasks
    cmds:
      - task --list
    silent: true

  # --8<-- [start:setup]
  setup:
    desc: "Initialize local dev environment"
    cmds:
      - task: setup-node
      - task: setup-python
      - task: setup-pre-commit

  setup-node:
    desc: "Install Node dependencies"
    internal: true
    cmds:
      - npm clean-install --save-dev @commitlint/cli @commitlint/config-conventional

  setup-python:
    desc: "Install Python dependencies"
    internal: true
    cmds:
      - uv sync --locked --all-packages

  setup-pre-commit:
    desc: "Setup pre-commit hooks"
    internal: true
    cmds:
      - uv run pre-commit install
  # --8<-- [end:setup]

  # --8<-- [start:checks]
  pre-commit:
    desc: "Run pre commit checks"
    cmds:
      - uv run pre-commit run --all-files --show-diff-on-failure

  pre-pr:
    desc: "Run all checks before creating a PR"
    cmds:
      - task: pre-commit
      - task: unit-test

  unit-test:
    desc: "Run all unit tests in parallel"
    deps:
      - unit-test-backend

  unit-test-backend:
    desc: "Run table-maintenance backend tests"
    internal: true
    cmds:
      - cmd: echo "TODO:// uv run --project src/table-maintenance/backend --directory src/table-maintenance/backend pytest -v"
  # --8<-- [end:checks]

  # --8<-- [start:bootstrap-apps]
  bootstrap-apps:
    desc: "Bootstrap all K8s components (DEPLOY_METHOD: scripts|argocd)"
    requires:
      vars:
        - name: KUBE_CONTEXT
        - name: DEPLOY_METHOD
          enum: ["scripts", "argocd"]
    cmds:
      - task: bootstrap-apps-by-{{.DEPLOY_METHOD}}
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"

  bootstrap-apps-by-scripts:
    internal: true
    requires:
      vars:
        - name: KUBE_CONTEXT
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 10-cert-manager/install.sh
      - bash 10-kube-prometheus/install.sh
      - bash 10-strimzi-operator/install.sh
      - bash 10-cert-manager/validate.sh
      - bash 10-kube-prometheus/validate.sh
      - bash 10-strimzi-operator/validate.sh
      - bash 11-keda/install.sh
      - bash 11-spark-operator/install.sh
      - bash 11-otel-operator/install.sh
      - bash 11-keda/validate.sh
      - bash 11-spark-operator/validate.sh
      - bash 11-otel-operator/validate.sh
      - bash 20-kafka-cluster/install.sh
      - bash 20-minio/install.sh
      - bash 20-mysql/install.sh
      - bash 20-jaeger-thanos/install.sh
      - bash 20-jaeger-trino/install.sh
      - bash 20-kafka-cluster/validate.sh
      - bash 20-minio/validate.sh
      - bash 20-mysql/validate.sh
      - bash 20-jaeger-thanos/validate.sh
      - bash 20-jaeger-trino/validate.sh
      - bash 21-kafka-debezium-mysql-connector/install.sh
      - bash 21-kafka-debezium-mysql-connector/validate.sh
      - bash 22-kafka-iceberg-connector/install.sh
      - bash 22-kafka-iceberg-connector/validate.sh
      - bash 23-trino/install.sh
      - bash 23-trino/validate.sh
      - bash 30-thanos/install.sh
      - bash 30-thanos/validate.sh

  bootstrap-apps-by-argocd:
    internal: true
    requires:
      vars:
        - name: KUBE_CONTEXT
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 00-argocd/install.sh
      - bash 00-argocd/validate.sh
      - bash 01-argocd-health-checks/patch.sh
      - bash 02-argocd-apps/install.sh
      - bash 02-argocd-apps/validate.sh
  # --8<-- [end:bootstrap-apps]

  # --8<-- [start:validate]
  validate-apps:
    desc: "Validate all K8s components in parallel (KUBE_CONTEXT required)"
    requires:
      vars:
        - name: KUBE_CONTEXT
    deps:
      - task: validate-cert-manager
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kube-prometheus
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-strimzi-operator
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-keda
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-spark-operator
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-otel-operator
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kafka-cluster
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-minio
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-mysql
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-jaeger-thanos
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-jaeger-trino
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kafka-debezium-mysql-connector
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kafka-iceberg-connector
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-trino
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-thanos
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"

  validate-cert-manager:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 10-cert-manager/validate.sh

  validate-kube-prometheus:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 10-kube-prometheus/validate.sh

  validate-strimzi-operator:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 10-strimzi-operator/validate.sh

  validate-keda:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 11-keda/validate.sh

  validate-spark-operator:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 11-spark-operator/validate.sh

  validate-otel-operator:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 11-otel-operator/validate.sh

  validate-kafka-cluster:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-kafka-cluster/validate.sh

  validate-minio:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-minio/validate.sh

  validate-mysql:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-mysql/validate.sh

  validate-jaeger-thanos:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-jaeger-thanos/validate.sh

  validate-jaeger-trino:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-jaeger-trino/validate.sh

  validate-kafka-debezium-mysql-connector:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 21-kafka-debezium-mysql-connector/validate.sh

  validate-kafka-iceberg-connector:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 22-kafka-iceberg-connector/validate.sh

  validate-trino:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 23-trino/validate.sh

  validate-thanos:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 30-thanos/validate.sh
  # --8<-- [end:validate]

  # --8<-- [start:docs]
  serve-docs:
    desc: Serve docs locally
    cmds:
      - uv run mkdocs serve --livereload -a localhost:8591
