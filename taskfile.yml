# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

output:
  group:
    begin: '::group::{{.TASK}}'
    end: '::endgroup::'

includes:
  dev:
    taskfile: ./tasks/dev.yml
    dir: '{{.ROOT_DIR}}'
  checks:
    taskfile: ./tasks/checks.yml
    dir: '{{.ROOT_DIR}}'
  cluster:
    taskfile: ./tasks/cluster.yml
    dir: '{{.ROOT_DIR}}'
  apps:
    taskfile: ./tasks/apps.yml
    dir: '{{.ROOT_DIR}}'
  trino:
    taskfile: ./tasks/trino.yml
    dir: '{{.ROOT_DIR}}'
  docs:
    taskfile: ./tasks/docs.yml
    dir: '{{.ROOT_DIR}}'

tasks:
  default:
    desc: Display available tasks
    cmds:
      - task --list
    silent: true

  pre-pr:
    desc: "Run all checks before creating a PR"
    cmds:
      - task: checks:pre-pr

  pre-commit:
    desc: "Run pre commit checks"
    cmds:
      - task: checks:pre-commit

  unit-test:
    desc: "Run all unit tests in parallel"
    cmds:
      - task: checks:unit-test

  serve-docs:
    desc: Serve docs locally
    cmds:
      - task: docs:serve

  onboard:
    desc: "One-shot setup for a new machine: check tools, start cluster, bootstrap apps, sync dev env"
    preconditions:
      - sh: command -v colima
        msg: "colima missing, run brew install colima"
      - sh: command -v docker
        msg: "docker missing, run brew install docker"
      - sh: command -v kubectl
        msg: "kubectl missing, run brew install kubectl"
      - sh: command -v minikube
        msg: "minikube missing, run brew install minikube"
      - sh: command -v helm
        msg: "helm missing, run brew install helm"
      - sh: command -v jsonnet
        msg: "jsonnet missing, run brew install jsonnet"
      - sh: command -v jb
        msg: "jb missing, run brew install jsonnet-bundler"
      - sh: command -v envsubst
        msg: "envsubst missing, run brew install gettext"
      - sh: command -v keytool
        msg: "keytool missing, run brew install openjdk@21"
      - sh: command -v npm
        msg: "npm missing, run brew install node"
      - sh: command -v uv
        msg: "uv missing, run brew install uv"
    cmds:
      - task: cluster:bootstrap
      - task: apps:bootstrap
        vars:
          KUBE_CONTEXT: 'retail-lakehouse'
          DEPLOY_METHOD: 'scripts'
      - task: dev:sync
