# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

output:
  group:
    begin: '::group::{{.TASK}}'
    end: '::endgroup::'

includes:
  setup:
    taskfile: ./tasks/setup.yml
    dir: '{{.ROOT_DIR}}'
  checks:
    taskfile: ./tasks/checks.yml
    dir: '{{.ROOT_DIR}}'
  prereqs:
    taskfile: ./tasks/prereqs.yml
    dir: '{{.ROOT_DIR}}'
  bootstrap:
    taskfile: ./tasks/bootstrap.yml
    dir: '{{.ROOT_DIR}}'
  validate:
    taskfile: ./tasks/validate.yml
    dir: '{{.ROOT_DIR}}'
  trino:
    taskfile: ./tasks/trino.yml
    dir: '{{.ROOT_DIR}}'
  docs:
    taskfile: ./tasks/docs.yml
    dir: '{{.ROOT_DIR}}'

tasks:
  default:
    desc: Display available tasks
    cmds:
      - task --list
    silent: true

  pre-pr:
    desc: "Alias for checks:pre-pr (kept for stop-hook compatibility)"
    cmds:
      - task: checks:pre-pr
