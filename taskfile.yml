# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

output:
  group:
    begin: '::group::{{.TASK}}'
    end: '::endgroup::'

vars:
  AVAILABLE_KUBE_CONTEXTS:
    sh: command -v kubectl >/dev/null 2>&1 && kubectl config get-contexts -o name || true

includes:
  dev:
    taskfile: ./tasks/dev.yml
    dir: '{{.ROOT_DIR}}'
  checks:
    taskfile: ./tasks/checks.yml
    dir: '{{.ROOT_DIR}}'
  cluster:
    taskfile: ./tasks/cluster.yml
    dir: '{{.ROOT_DIR}}'
    vars:
      AVAILABLE_KUBE_CONTEXTS: '{{.AVAILABLE_KUBE_CONTEXTS}}'
  apps:
    taskfile: ./tasks/apps.yml
    dir: '{{.ROOT_DIR}}'
  trino:
    taskfile: ./tasks/trino.yml
    dir: '{{.ROOT_DIR}}'
    vars:
      AVAILABLE_KUBE_CONTEXTS: '{{.AVAILABLE_KUBE_CONTEXTS}}'
  docs:
    taskfile: ./tasks/docs.yml
    dir: '{{.ROOT_DIR}}'

tasks:
  default:
    desc: Display available tasks
    cmds:
      - task --list
    silent: true

  pre-pr:
    desc: "Run all checks before creating a PR"
    cmds:
      - task: checks:pre-pr

  pre-commit:
    desc: "Run pre commit checks"
    cmds:
      - task: checks:pre-commit

  unit-test:
    desc: "Run all unit tests in parallel"
    cmds:
      - task: checks:unit-test

  serve-docs:
    desc: Serve docs locally
    cmds:
      - task: docs:serve

  onboard:
    desc: "One-shot setup: check tools, bootstrap cluster + apps, sync dev"
    preconditions:
      - sh: '[ "$(uname -s)" = "Darwin" ]'
        msg: "Only macOS (Darwin) is supported right now, sorry"
      - sh: command -v colima
        msg: "colima missing, run brew install colima"
      - sh: command -v docker
        msg: "docker missing, run brew install docker"
      - sh: command -v kubectl
        msg: "kubectl missing, run brew install kubectl"
      - sh: command -v minikube
        msg: "minikube missing, run brew install minikube"
      - sh: command -v helm
        msg: "helm missing, run brew install helm"
      - sh: command -v jsonnet
        msg: "jsonnet missing, run brew install jsonnet"
      - sh: command -v jb
        msg: "jb missing, run brew install jsonnet-bundler"
      - sh: command -v envsubst
        msg: "envsubst missing, run brew install gettext"
      - sh: command -v keytool
        msg: "keytool missing, run brew install openjdk@21"
      - sh: command -v npm
        msg: "npm missing, run brew install node"
      - sh: command -v uv
        msg: "uv missing, run brew install uv"
    requires:
      vars:
        - name: KUBE_CONTEXT
        - name: DEPLOY_METHOD
          enum: ["scripts", "argocd"]
    cmds:
      - task: cluster:bootstrap
        vars:
          KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
      - task: apps:bootstrap
        vars:
          KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
          DEPLOY_METHOD: '{{.DEPLOY_METHOD}}'
      - task: dev:sync
    prompt: |
      This will take 10-20 minutes and does the following:
      - Bootstrap a colima VM named '{{.KUBE_CONTEXT}}'
      - Bootstrap up a minikube K8s cluster named '{{.KUBE_CONTEXT}}'
      - Bootstrap all K8s apps to the cluster via '{{.DEPLOY_METHOD}}'
      - Sets up your local dev environment (Python, Node, pre-commit hooks)

      Continue?

  offboard:
    desc: "Tear down: delete minikube cluster and colima VM (no-op if absent)"
    requires:
      vars:
        - name: KUBE_CONTEXT
    cmds:
      - minikube delete -p {{.KUBE_CONTEXT}}
      - colima delete -p {{.KUBE_CONTEXT}} -f
    prompt: |
      This will permanently delete the colima VM '{{.KUBE_CONTEXT}}' and
      everything inside it (minikube cluster, container images, volumes).

      Continue?
