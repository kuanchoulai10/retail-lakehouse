default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: meta
    hooks:
      - id: identity
        name: Print checked files
        description: Print input to the static check hooks for troubleshooting
      - id: check-hooks-apply
        name: Check if all hooks apply to the repository
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "3e8a8703264a2f4a69428a0aa4dcb512790b2c8c" # v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: check-toml
      - id: check-executables-have-shebangs
  - repo: local
    hooks:
      - id: check-shell-scripts-are-executable
        name: Check shell scripts are executable
        entry: "bash -c 'rc=0; for f in \"$@\"; do if [[ ! -x \"$f\" ]]; then echo \"not executable $f\"; rc=1; fi; done; exit $rc' --"
        language: system
        types: [shell]
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
  - repo: local
    hooks:
      - id: commitlint
        name: Commitlint
        entry: npx --no -- commitlint --edit
        language: system
        stages: [commit-msg]
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        exclude: ^src/table-maintenance/(backend|scheduler)/
      - id: ty-backend
        name: ty (backend)
        entry: uv run --project src/table-maintenance/backend --directory src/table-maintenance/backend ty check
        language: system
        types: [python]
        files: ^src/table-maintenance/backend/
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "aca6d4c8045a504e2812ea4bedff1d0a09e437bc" # v0.15.8
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: "83d9cd684c87d95d656c1458ef04895a7f1cbd8e" # v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: "ea2eb407b4cbce87cf0d502f36578950494f5ac9" # v1.23.1
    hooks:
      - id: zizmor
        name: Run zizmor to check for github workflow syntax errors
        types: [yaml]
        files: ^\.github/workflows/.*$|^\.github/actions/.*$
        require_serial: true
        entry: zizmor
