# --8<-- [start:image]
image:
  tag: "476"
# --8<-- [end:image]

# --8<-- [start:server]
server:
  workers: 2
  config:
    authenticationType: "oauth2"
  autoscaling:
    enabled: false
  keda:
    enabled: true
    minReplicaCount: 2
    maxReplicaCount: 5
    pollingInterval: 15
    initialCooldownPeriod: 0 # default 0s
    cooldownPeriod: 300 # default 300s, only applies when scaling to 0
    fallback:
      failureThreshold: 3
      replicas: 2
      behavior: "static"
    advanced:
      horizontalPodAutoscalerConfig:
        behavior:
          scaleUp:
            stabilizationWindowSeconds: 0
            selectPolicy: Max
            policies:
              - type: Percent
                value: 100
                periodSeconds: 120
              - type: Pods
                value: 5
                periodSeconds: 60
          scaleDown:
            stabilizationWindowSeconds: 300
            selectPolicy: Min
            policies:
              - type: Percent
                value: 10
                periodSeconds: 60
    triggers:
      - type: prometheus
        metadata:
          serverAddress: http://prometheus-k8s.monitoring.svc.cluster.local:9090
          metricName: trino_running_queries
          query: trino_execution_QueryManager_RunningQueries{job="trino"}
          threshold: "1"
    annotations: {}
# --8<-- [end:server]

# --8<-- [start:initContainers]
initContainers:
  coordinator:
    - name: build-truststore
      image: eclipse-temurin:21-jre
      command:
        - sh
        - -c
        - |
          keytool -importcert -noprompt \
            -alias trino-ca \
            -file /tls-src/ca.crt \
            -keystore /tls-built/truststore.p12 \
            -storetype PKCS12 \
            -storepass "$KEYSTORE_PASSWORD"
      env:
        - name: KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trino-keystore-password
              key: password
      volumeMounts:
        - name: tls-certs
          mountPath: /tls-src
          readOnly: true
        - name: tls-built
          mountPath: /tls-built
# --8<-- [end:initContainers]

# --8<-- [start:resource-groups]
resourceGroups:
  type: configmap
  # Resource groups file is mounted to /etc/trino/resource-groups/resource-groups.json
  resourceGroupsConfig: |-
      {
        "rootGroups": [
          {
            "name": "global",
            "hardConcurrencyLimit": 10,
            "maxQueued": 100,
            "schedulingPolicy": "fair",
            "jmxExport": true
          }
        ],
        "selectors": [
          {
            "group": "global"
          }
        ]
      }

# --8<-- [end:resource-groups]

# --8<-- [start:coordinator]
coordinator:
  jvm:
    maxHeapSize: "8G"
  livenessProbe:
    initialDelaySeconds: 30
    failureThreshold: 20
  readinessProbe:
    initialDelaySeconds: 30
    failureThreshold: 20
  additionalVolumes:
    - name: tls-certs
      secret:
        secretName: trino-tls-secret
    - name: tls-built
      emptyDir: {}
  additionalVolumeMounts:
    - name: tls-certs
      mountPath: /etc/trino/tls
      readOnly: true
    - name: tls-built
      mountPath: /etc/trino/truststore
      readOnly: true
  additionalExposedPorts:
    https:
      servicePort: 8443
      name: https
      port: 8443
      protocol: TCP
  additionalJVMConfig:
    - --sun-misc-unsafe-memory-access=allow
  # additionalConfigFiles:
  #   http-event-listener.properties: |
  #     event-listener.name=http
  #     http-event-listener.log-created=true
  #     http-event-listener.log-completed=true
  #     http-event-listener.connect-ingest-uri=<your ingest URI>
  # access-control.properties: |
  #   access-control.name=file
  #   security.refresh-period=150s
  #   security.config-file=/etc/trino/access-control/rules.json
# --8<-- [end:coordinator]



# --8<-- [start:worker]
worker:
  jvm:
    maxHeapSize: "8G"
  livenessProbe:
    initialDelaySeconds: 30
    failureThreshold: 20
  readinessProbe:
    initialDelaySeconds: 30
    failureThreshold: 20
  additionalJVMConfig:
    - --sun-misc-unsafe-memory-access=allow
  # additionalConfigFiles:
  #   http-event-listener.properties: |
  #     event-listener.name=http
  #     http-event-listener.log-created=true
  #     http-event-listener.log-completed=true
  #     http-event-listener.connect-ingest-uri=<your ingest URI>
# --8<-- [end:worker]

# --8<-- [start:jmx]
jmx:
  enabled: true
  exporter:
    enabled: true
    image: bitnami/jmx-exporter:latest
    configProperties: |-
      hostPort: localhost:{{- .Values.jmx.registryPort }}
      startDelaySeconds: 0
      ssl: false
      lowercaseOutputName: false
      lowercaseOutputLabelNames: false
# --8<-- [end:jmx]

# --8<-- [start:serviceMonitor]
serviceMonitor:
  enabled: true
  labels:
    prometheus: kube-prometheus
  interval: "30s"
# --8<-- [end:serviceMonitor]

# --8<-- [start:catalogs]
catalogs:
  faker: |
    connector.name=faker
    faker.null-probability=0.1
    faker.default-limit=1000
    faker.locale=en

# https://trino.io/docs/current/connector/iceberg.html#authorization
# https://trino.io/docs/current/object-storage/file-system-s3.html
# --8<-- [end:catalogs]
