# Trino PKI:
#   selfSigned Issuer  →  bootstraps  →  trino-ca (isCA: true, stored in trino-ca-secret)
#   trino-ca-issuer (ca:)  →  signs  →  trino-tls (server) + trino-client-* (clients)
# The single trino-ca-issuer is what makes server and client certs share a chain
# of trust, enabling mTLS validation in both directions.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: trino-selfsigned-issuer
  namespace: trino
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trino-ca
  namespace: trino
spec:
  isCA: true
  commonName: trino-ca
  secretName: trino-ca-secret
  duration: 87600h         # 10 years
  renewBefore: 720h
  issuerRef:
    name: trino-selfsigned-issuer
    kind: Issuer
  privateKey:
    algorithm: RSA
    size: 2048
    encoding: PKCS8
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: trino-ca-issuer
  namespace: trino
spec:
  ca:
    secretName: trino-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trino-tls
  namespace: trino
spec:
  secretName: trino-tls-secret
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: trino-ca-issuer
    kind: Issuer
  commonName: trino.trino.svc.cluster.local
  dnsNames:
    - trino.trino.svc.cluster.local
    - localhost
  ipAddresses:
    - "127.0.0.1"
  privateKey:
    algorithm: RSA
    size: 2048
    encoding: PKCS8
  usages:
    - server auth
  keystores:
    pkcs12:
      create: true
      passwordSecretRef:
        name: trino-keystore-password
        key: password
