apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: trino-selfsigned-issuer
  namespace: trino
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trino-tls
  namespace: trino
spec:
  secretName: trino-tls-secret
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: trino-selfsigned-issuer
    kind: Issuer
  commonName: trino.trino.svc.cluster.local
  dnsNames:
    - trino.trino.svc.cluster.local
    - localhost
  ipAddresses:
    - "127.0.0.1"
  privateKey:
    algorithm: RSA
    size: 2048
    encoding: PKCS8
  usages:
    - server auth
  keystores:
    pkcs12:
      create: true
      passwordSecretRef:
        name: trino-keystore-password
        key: password
