{{- if and (ge 20 (int .Values.deploy.waveFrom)) (le 20 (int .Values.deploy.waveTo)) }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger-thanos
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20" # after opentelemetry-operator (wave 11)
spec:
  project: {{ .Values.project.name }}
  sources:
    - repoURL: https://github.com/kuanchoulai10/retail-lakehouse
      path: platform/20-jaeger-thanos
      targetRevision: main
  destination:
    name: {{ .Values.spec.destination.name }}
    namespace: thanos
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
{{- end }}
