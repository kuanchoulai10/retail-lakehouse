apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: table-maintenance-rewrite-data-files
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: localhost:5000/table-maintenance-jobs:latest
  imagePullPolicy: Never
  mainApplicationFile: local:///opt/spark/work-dir/main.py
  sparkVersion: "4.0.0"

  deps:
    jars:
      - https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-spark-runtime-4.0_2.13/1.10.1/iceberg-spark-runtime-4.0_2.13-1.10.1.jar
      - https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-aws-bundle/1.10.1/iceberg-aws-bundle-1.10.1.jar

  sparkConf:
    # Iceberg extensions
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    # Polaris REST catalog registered as 'retail'
    spark.sql.catalog.retail: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.retail.type: "rest"
    spark.sql.catalog.retail.uri: "http://polaris.polaris.svc.cluster.local:8181/api/catalog"
    spark.sql.catalog.retail.warehouse: "iceberg"
    spark.sql.catalog.retail.credential: "root:secret"
    spark.sql.catalog.retail.scope: "PRINCIPAL_ROLE:ALL"
    spark.sql.catalog.retail.io-impl: "org.apache.iceberg.aws.s3.S3FileIO"
    spark.sql.catalog.retail.s3.endpoint: "http://minio-api.minio.svc.cluster.local:9000"
    spark.sql.catalog.retail.s3.path-style-access: "true"
    # Ivy cache for jar downloads
    spark.driver.extraJavaOptions: "-Divy.cache.dir=/tmp/.ivy2 -Divy.home=/tmp/.ivy"

  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark-operator-spark
    env:
      - name: GLAC_JOB_TYPE
        value: rewrite_data_files
      - name: GLAC_CATALOG
        value: retail
      - name: GLAC_REWRITE_DATA_FILES__TABLE
        value: "inventory.orders"
      - name: GLAC_REWRITE_DATA_FILES__REWRITE_ALL
        value: "true"
      - name: AWS_ACCESS_KEY_ID
        value: minio_user
      - name: AWS_SECRET_ACCESS_KEY
        value: minio_password
      - name: AWS_REGION
        value: dummy-region

  executor:
    cores: 1
    instances: 1
    memory: "1g"
    env:
      - name: AWS_ACCESS_KEY_ID
        value: minio_user
      - name: AWS_SECRET_ACCESS_KEY
        value: minio_password
      - name: AWS_REGION
        value: dummy-region
