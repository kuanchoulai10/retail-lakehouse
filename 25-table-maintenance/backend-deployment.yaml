apiVersion: apps/v1
kind: Deployment
metadata:
  name: table-maintenance-backend
  namespace: default
  labels:
    app: table-maintenance-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: table-maintenance-backend
  template:
    metadata:
      labels:
        app: table-maintenance-backend
    spec:
      serviceAccountName: table-maintenance-backend
      containers:
        - name: backend
          image: localhost:5001/table-maintenance-backend:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: table-maintenance-backend
  namespace: default
  labels:
    app: table-maintenance-backend
spec:
  selector:
    app: table-maintenance-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
