apiVersion: apps/v1
kind: Deployment
metadata:
  name: table-maintenance-scheduler
  namespace: default
  labels:
    app: table-maintenance-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: table-maintenance-scheduler
  template:
    metadata:
      labels:
        app: table-maintenance-scheduler
    spec:
      containers:
        - name: scheduler
          image: localhost:5001/table-maintenance-scheduler:latest
          imagePullPolicy: Never
          env:
            - name: SCHEDULER_DATABASE_URL
              value: "sqlite:////data/scheduler.db"
            - name: SCHEDULER_INTERVAL_SECONDS
              value: "30"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
