apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: polaris-events
  namespace: polaris
spec:
  mode: deployment
  replicas: 1
  # Contrib image is required for the `kafka` exporter and the OTTL
  # `transform` processor used in the final pipeline (Task 8). We ship the
  # debug exporter in the initial revision so a real event can be captured
  # and its `<TABLE_ID_ATTR>` attribute name observed before wiring Kafka.
  image: otel/opentelemetry-collector-contrib:0.137.0
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch:
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
