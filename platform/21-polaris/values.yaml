polaris:
  image:
    repository: apache/polaris
    tag: "1.5.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  # ---------------------------------------------------------------------------
  # Persistence
  # ---------------------------------------------------------------------------
  persistence:
    type: relational-jdbc
    relationalJdbc:
      # The Secret 'polaris-db' is created by platform/20-polaris-db/ in the same namespace.
      # It exposes 'username', 'password', and 'jdbcUrl' keys.
      secret:
        name: polaris-db
        username: username
        password: password
        jdbcUrl: jdbcUrl

  # ---------------------------------------------------------------------------
  # Storage credentials (MinIO)
  # ---------------------------------------------------------------------------
  # Injected as polaris.storage.aws.access-key / polaris.storage.aws.secret-key
  # (Polaris-native Quarkus properties). Used by Polaris for catalog storage
  # operations (writing metadata, vended credentials flow).
  storage:
    secret:
      name: polaris-storage-secret
      awsAccessKeyId: awsAccessKeyId
      awsSecretAccessKey: awsSecretAccessKey

  # ---------------------------------------------------------------------------
  # Environment variables — S3/STS endpoint and bootstrap credentials
  # ---------------------------------------------------------------------------
  # AWS SDK reads AWS_ENDPOINT_URL_S3 / AWS_ENDPOINT_URL_STS to redirect all
  # S3 and STS calls to MinIO instead of real AWS.
  # POLARIS_BOOTSTRAP_CREDENTIALS creates the initial admin principal on first start.
  # Format: <realm>,<username>,<password>  (comma-separated, no spaces)
  extraEnv:
    - name: AWS_REGION
      value: "dummy-region"
    - name: AWS_ENDPOINT_URL_S3
      value: "http://minio-api.minio.svc.cluster.local:9000"
    - name: AWS_ENDPOINT_URL_STS
      value: "http://minio-api.minio.svc.cluster.local:9000"
    - name: POLARIS_BOOTSTRAP_CREDENTIALS
      valueFrom:
        secretKeyRef:
          name: polaris-bootstrap-secret
          key: credentials

  authentication:
    type: internal
    tokenBroker:
      type: rsa-key-pair
      maxTokenGeneration: PT1H
      secret:
        name: ~

  realmContext:
    type: default
    realms:
      - POLARIS

  tracing:
    enabled: false

  metrics:
    enabled: true

  serviceMonitor:
    enabled: true
    labels: {}

  service:
    type: ClusterIP
    ports:
      - name: polaris-http
        port: 8181

  # ---------------------------------------------------------------------------
  # Advanced Configuration
  # ---------------------------------------------------------------------------
  # Enable the built-in `persistence-in-memory-buffer` event listener. It
  # buffers events in memory then flushes them to the polaris_schema.events
  # table in the PostgreSQL backing store, which we then treat as an
  # outbox-style change feed.
  #
  # Coverage caveat (verified against Polaris 1.5.0 source): the
  # PolarisPersistenceEventListener only wires AFTER_CREATE_TABLE and
  # AFTER_CREATE_CATALOG into processEvent(); all other event types are
  # dropped by the "default" branch of its onEvent() switch. Downstream
  # consumers can therefore only rely on catalog and table creation
  # events being persisted today; snapshot commits and other mutations
  # are not.
  #
  # Defaults for the buffer (kept implicit here so upstream changes flow
  # through): buffer-time=5000ms, max-buffer-size=5. Flush fires on
  # whichever threshold trips first.
  advancedConfig:
    polaris.event-listener.types: "persistence-in-memory-buffer"
