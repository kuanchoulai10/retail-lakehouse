polaris:
  image:
    repository: apache/polaris
    tag: "1.5.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  # ---------------------------------------------------------------------------
  # Persistence
  # ---------------------------------------------------------------------------
  persistence:
    type: relational-jdbc
    relationalJdbc:
      # The Secret 'polaris-db' is created by platform/20-polaris-db/ in the same namespace.
      # It exposes 'username', 'password', and 'jdbcUrl' keys.
      secret:
        name: polaris-db
        username: username
        password: password
        jdbcUrl: jdbcUrl

  # ---------------------------------------------------------------------------
  # Storage credentials (MinIO)
  # ---------------------------------------------------------------------------
  # Injected as polaris.storage.aws.access-key / polaris.storage.aws.secret-key
  # (Polaris-native Quarkus properties). Used by Polaris for catalog storage
  # operations (writing metadata, vended credentials flow).
  storage:
    secret:
      name: polaris-storage-secret
      awsAccessKeyId: awsAccessKeyId
      awsSecretAccessKey: awsSecretAccessKey

  # ---------------------------------------------------------------------------
  # Environment variables — S3/STS endpoint and bootstrap credentials
  # ---------------------------------------------------------------------------
  # AWS SDK reads AWS_ENDPOINT_URL_S3 / AWS_ENDPOINT_URL_STS to redirect all
  # S3 and STS calls to MinIO instead of real AWS.
  # POLARIS_BOOTSTRAP_CREDENTIALS creates the initial admin principal on first start.
  # Format: <realm>,<username>,<password>  (comma-separated, no spaces)
  extraEnv:
    - name: AWS_REGION
      value: "dummy-region"
    - name: AWS_ENDPOINT_URL_S3
      value: "http://minio-api.minio.svc.cluster.local:9000"
    - name: AWS_ENDPOINT_URL_STS
      value: "http://minio-api.minio.svc.cluster.local:9000"
    - name: POLARIS_BOOTSTRAP_CREDENTIALS
      valueFrom:
        secretKeyRef:
          name: polaris-bootstrap-secret
          key: credentials

  authentication:
    type: internal
    tokenBroker:
      type: rsa-key-pair
      maxTokenGeneration: PT1H
      secret:
        name: ~

  realmContext:
    type: default
    realms:
      - POLARIS

  # ---------------------------------------------------------------------------
  # Telemetry
  # ---------------------------------------------------------------------------
  # Enabling `tracing` turns on the Quarkus OTEL SDK and points the OTLP
  # exporter at the collector deployed by platform/22-polaris-events/.
  # Log records (used by the Polaris `opentelemetry` event listener) flow to
  # the same endpoint; traces are sampled off since we only want events.
  tracing:
    enabled: true
    endpoint: "http://polaris-events-collector.polaris.svc.cluster.local:4317"
    sample: "none"

  metrics:
    enabled: true

  # ---------------------------------------------------------------------------
  # Advanced Configuration
  # ---------------------------------------------------------------------------
  # Raw Quarkus/Polaris properties merged last, overriding anything the chart
  # derives from higher-level values. Used here to enable the OTLP logs
  # exporter (Quarkus keeps this off by default even when the SDK is on) and
  # to wire the built-in `opentelemetry` event listener that emits Polaris
  # catalog events as OTEL log records. Only AFTER_UPDATE_TABLE is enabled;
  # add more event types to the comma-separated list to extend the pipeline
  # without redeploying Polaris.
  advancedConfig:
    quarkus.otel.logs.exporter: "otlp"
    polaris.event-listener.types: "opentelemetry"
    polaris.event-listener.opentelemetry.enabled-event-types: "AFTER_UPDATE_TABLE"

  serviceMonitor:
    enabled: true
    labels: {}

  service:
    type: ClusterIP
    ports:
      - name: polaris-http
        port: 8181
