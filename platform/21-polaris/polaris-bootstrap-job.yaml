apiVersion: batch/v1
kind: Job
metadata:
  name: polaris-bootstrap
  namespace: polaris
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: apache/polaris-admin-tool:1.3.0-incubating
          args:
            - bootstrap
            - --realm=POLARIS
            - --credential=POLARIS,root,secret
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: polaris-db
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: polaris-db
                  key: password
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: polaris-db
                  key: jdbcUrl
