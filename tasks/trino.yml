# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  issue-cert:
    desc: 'Issue a Trino mTLS client cert'
    silent: true
    interactive: true
    requires:
      vars:
        - name: KUBE_CONTEXT
          enum:
            ref: .AVAILABLE_KUBE_CONTEXTS | splitLines | compact
        - name: TRINO_USER
    vars:
      OUTDIR: 'platform/23-trino/client-certs/{{.TRINO_USER}}'
      PRINT_USAGE: '{{.PRINT_USAGE | default "true"}}'
    status:
      - |
        kubectl get certificate trino-client-{{.TRINO_USER}} \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' \
          --namespace trino \
          --context {{.KUBE_CONTEXT}} \
          2>/dev/null | grep -q True
      - test -f {{.OUTDIR}}/keystore.p12
      - test -f {{.OUTDIR}}/truststore.p12
      - test -f {{.OUTDIR}}/ca.crt
      - test -f {{.OUTDIR}}/password.txt
    cmds:
      - mkdir -p {{.OUTDIR}}
      - chmod 700 {{.OUTDIR}}
      - |
        TRINO_USER={{.TRINO_USER}} \
        envsubst < platform/23-trino/client-certificate-template.yaml \
          | kubectl apply \
              -f - \
              --context {{.KUBE_CONTEXT}}
      - |
        kubectl wait \
          --for=condition=Ready certificate/trino-client-{{.TRINO_USER}} \
          --namespace trino \
          --timeout 120s \
          --context {{.KUBE_CONTEXT}}
      - |
        kubectl get secret trino-client-{{.TRINO_USER}}-tls \
          -o jsonpath='{.data.keystore\.p12}' \
          --namespace trino \
          --context {{.KUBE_CONTEXT}} \
          | base64 -d > {{.OUTDIR}}/keystore.p12
      - |
        kubectl get secret trino-client-{{.TRINO_USER}}-tls \
          -o jsonpath='{.data.ca\.crt}' \
          --namespace trino \
          --context {{.KUBE_CONTEXT}} \
          | base64 -d > {{.OUTDIR}}/ca.crt
      - |
        kubectl get secret trino-keystore-password \
          -o jsonpath='{.data.password}' \
          --namespace trino \
          --context {{.KUBE_CONTEXT}} \
          | base64 -d > {{.OUTDIR}}/password.txt
      - rm -f {{.OUTDIR}}/truststore.p12
      - |
        keytool -importcert -noprompt \
          -alias trino-ca \
          -file {{.OUTDIR}}/ca.crt \
          -keystore {{.OUTDIR}}/truststore.p12 \
          -storetype PKCS12 \
          -storepass "$(cat {{.OUTDIR}}/password.txt)"
      - chmod 600 {{.OUTDIR}}/keystore.p12 {{.OUTDIR}}/truststore.p12 {{.OUTDIR}}/ca.crt {{.OUTDIR}}/password.txt
      - echo "Local files written at {{.OUTDIR}}/"
      - |
        if [ "{{.PRINT_USAGE}}" = "true" ]; then
          task trino:print-usage TRINO_USER={{.TRINO_USER}} KUBE_CONTEXT={{.KUBE_CONTEXT}}
        fi

  print-usage:
    desc: 'Print the trino CLI command to query as TRINO_USER'
    silent: true
    interactive: true
    requires:
      vars:
        - name: KUBE_CONTEXT
          enum:
            ref: .AVAILABLE_KUBE_CONTEXTS | splitLines | compact
        - name: TRINO_USER
    vars:
      OUTDIR: 'platform/23-trino/client-certs/{{.TRINO_USER}}'
    cmds:
      - |
        cat <<'EOF'

        To query Trino:

          # 1. Port-forward (in another terminal):
          kubectl port-forward svc/trino 18443:8443 \
            --namespace trino \
            --context {{.KUBE_CONTEXT}}

          # 2. Run a query:
          trino --server https://localhost:18443 --user {{.TRINO_USER}} \
            --keystore-path {{.OUTDIR}}/keystore.p12 \
            --keystore-password "$(cat {{.OUTDIR}}/password.txt)" \
            --truststore-path {{.OUTDIR}}/truststore.p12 \
            --truststore-password "$(cat {{.OUTDIR}}/password.txt)" \
            --execute "SHOW CATALOGS"

        EOF

  delete-cert:
    desc: 'Delete a Trino mTLS client cert and its local artifacts'
    silent: true
    interactive: true
    requires:
      vars:
        - name: KUBE_CONTEXT
          enum:
            ref: .AVAILABLE_KUBE_CONTEXTS | splitLines | compact
        - name: TRINO_USER
    vars:
      OUTDIR: 'platform/23-trino/client-certs/{{.TRINO_USER}}'
    cmds:
      - rm -rf {{.OUTDIR}}
      - echo "Local files removed at {{.OUTDIR}}/"
      - |
        kubectl delete secret trino-client-{{.TRINO_USER}}-tls \
          --ignore-not-found \
          --namespace trino \
          --context {{.KUBE_CONTEXT}}
      - |
        kubectl delete certificate trino-client-{{.TRINO_USER}} \
          --ignore-not-found \
          --namespace trino \
          --context {{.KUBE_CONTEXT}}

  shell:
    desc: 'Open an interactive Trino CLI shell as TRINO_USER (issues cert if needed)'
    silent: true
    interactive: true
    requires:
      vars:
        - name: KUBE_CONTEXT
          enum:
            ref: .AVAILABLE_KUBE_CONTEXTS | splitLines | compact
        - name: TRINO_USER
    vars:
      OUTDIR: 'platform/23-trino/client-certs/{{.TRINO_USER}}'
    cmds:
      - task: issue-cert
        vars:
          KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
          TRINO_USER: '{{.TRINO_USER}}'
          PRINT_USAGE: 'false'
      - |
        cleanup() {
          pkill -f 'port-forward.*trino.*18443' 2>/dev/null || true
        }
        trap cleanup EXIT

        kubectl port-forward svc/trino 18443:8443 \
          --namespace trino \
          --context {{.KUBE_CONTEXT}} >/dev/null 2>&1 &
        sleep 2

        trino --server https://localhost:18443 --user {{.TRINO_USER}} \
          --keystore-path {{.OUTDIR}}/keystore.p12 \
          --keystore-password "$(cat {{.OUTDIR}}/password.txt)" \
          --truststore-path {{.OUTDIR}}/truststore.p12 \
          --truststore-password "$(cat {{.OUTDIR}}/password.txt)"

  smoke-test:
    desc: 'End-to-end mTLS smoke test (issues throwaway cert, runs SHOW CATALOGS, cleans up)'
    silent: true
    interactive: true
    requires:
      vars:
        - name: KUBE_CONTEXT
          enum:
            ref: .AVAILABLE_KUBE_CONTEXTS | splitLines | compact
    vars:
      TRINO_USER: 'smoke-test'
      OUTDIR: 'platform/23-trino/client-certs/smoke-test'
    cmds:
      - task: issue-cert
        vars:
          KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
          TRINO_USER: '{{.TRINO_USER}}'
          PRINT_USAGE: 'false'
      - |
        cleanup() {
          pkill -f 'port-forward.*trino.*18443' 2>/dev/null || true
          task trino:delete-cert TRINO_USER={{.TRINO_USER}} KUBE_CONTEXT={{.KUBE_CONTEXT}}
        }
        trap cleanup EXIT

        kubectl port-forward svc/trino 18443:8443 \
          --namespace trino \
          --context {{.KUBE_CONTEXT}} >/dev/null 2>&1 &
        sleep 2

        echo "Running 'SHOW CATALOGS' via mTLS:"
        trino --server https://localhost:18443 --user {{.TRINO_USER}} \
          --keystore-path {{.OUTDIR}}/keystore.p12 \
          --keystore-password "$(cat {{.OUTDIR}}/password.txt)" \
          --truststore-path {{.OUTDIR}}/truststore.p12 \
          --truststore-password "$(cat {{.OUTDIR}}/password.txt)" \
          --execute "SHOW CATALOGS" 2> >(grep -v 'Unable to create a system terminal\|org.jline' >&2)
