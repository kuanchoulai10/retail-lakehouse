# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  bootstrap:
    desc: "Bootstrap local colima VM + minikube cluster"
    vars:
      PROFILE: 'retail-lakehouse'
    cmds:
      - |
        colima start \
          --cpu 9 \
          --memory 28 \
          --disk 120 \
          --runtime docker \
          --profile {{.PROFILE}}
      - |
        minikube start \
          --profile {{.PROFILE}} \
          --nodes 1 \
          --cpus 9 \
          --memory 26G \
          --disk-size 120G \
          --driver docker \
          --container-runtime docker \
          --kubernetes-version v1.33.2 \
          --addons registry --addons metrics-server \
          --insecure-registry "10.0.0.0/24" \
          --delete-on-failure
