# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  lint:
    desc: "Run pre commit checks"
    cmds:
      - uv run pre-commit run --all-files --show-diff-on-failure

  test:
    desc: "Run all unit tests in parallel"
    deps:
      - test-backend
      - test-spark

  test-backend:
    desc: "Run table-maintenance backend tests"
    internal: true
    cmds:
      - uv run --project src/table-maintenance/backend --directory src/table-maintenance/backend pytest -v

  test-spark:
    desc: "Run table-maintenance spark runtime tests"
    internal: true
    cmds:
      - cmd: echo "TODO:// uv run --project src/table-maintenance/runtime/spark --directory src/table-maintenance/runtime/spark pytest -v"

  arch:
    desc: "Run architecture boundary tests (import-linter)"
    cmds:
      - uv run --project src/table-maintenance/backend --directory src/table-maintenance/backend lint-imports
