# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  bootstrap:
    desc: "Bootstrap all K8s apps"
    requires:
      vars:
        - name: KUBE_CONTEXT
        - name: DEPLOY_METHOD
          enum: ["scripts", "argocd"]
    preconditions:
      - sh: command -v colima
        msg: "colima missing, run: brew install colima"
      - sh: command -v minikube
        msg: "minikube missing, run: brew install minikube"
      - sh: command -v kubectl
        msg: "kubectl missing, run: brew install kubectl"
      - sh: command -v helm
        msg: "helm missing, run: brew install helm"
      - sh: command -v sops
        msg: "sops missing, run: brew install sops"
      - sh: command -v git
        msg: "git missing, run: xcode-select --install (or brew install git)"
      - sh: command -v python3
        msg: "python3 missing, run: xcode-select --install (or brew install python@3.13)"
      - sh: colima status -p {{.KUBE_CONTEXT}} >/dev/null 2>&1
        msg: "colima VM '{{.KUBE_CONTEXT}}' not running (run: task cluster:bootstrap KUBE_CONTEXT={{.KUBE_CONTEXT}})"
      - sh: minikube status -p {{.KUBE_CONTEXT}} >/dev/null 2>&1
        msg: "minikube profile '{{.KUBE_CONTEXT}}' not running (run: task cluster:bootstrap KUBE_CONTEXT={{.KUBE_CONTEXT}})"
      - sh: kubectl config get-contexts {{.KUBE_CONTEXT}} >/dev/null 2>&1
        msg: "kubectl context '{{.KUBE_CONTEXT}}' not found"
    cmds:
      - task: bootstrap-by-{{.DEPLOY_METHOD}}
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"

  bootstrap-by-scripts:
    internal: true
    requires:
      vars:
        - name: KUBE_CONTEXT
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    status:
      - TIMEOUT=10s bash 10-cert-manager/validate.sh
      - TIMEOUT=10s bash 10-kube-prometheus/validate.sh
      - TIMEOUT=10s bash 10-strimzi-operator/validate.sh
      - TIMEOUT=10s bash 11-keda/validate.sh
      - TIMEOUT=10s bash 11-spark-operator/validate.sh
      - TIMEOUT=10s bash 11-otel-operator/validate.sh
      - TIMEOUT=10s bash 20-kafka-cluster/validate.sh
      - TIMEOUT=10s bash 20-minio/validate.sh
      - TIMEOUT=10s bash 20-mysql/validate.sh
      - TIMEOUT=10s bash 20-jaeger-thanos/validate.sh
      - TIMEOUT=10s bash 20-jaeger-trino/validate.sh
      - TIMEOUT=10s bash 20-polaris-db/validate.sh
      - TIMEOUT=10s bash 21-polaris/validate.sh
      - TIMEOUT=10s bash 21-kafka-debezium-mysql-connector/validate.sh
      - TIMEOUT=10s bash 22-kafka-iceberg-connector/validate.sh
      - TIMEOUT=10s bash 23-trino/validate.sh
    cmds:
      - bash 10-cert-manager/bootstrap.sh
      - bash 10-kube-prometheus/bootstrap.sh
      - bash 10-strimzi-operator/bootstrap.sh
      - bash 10-cert-manager/validate.sh
      - bash 10-kube-prometheus/validate.sh
      - bash 10-strimzi-operator/validate.sh
      - bash 11-keda/bootstrap.sh
      - bash 11-spark-operator/bootstrap.sh
      - bash 11-otel-operator/bootstrap.sh
      - bash 11-keda/validate.sh
      - bash 11-spark-operator/validate.sh
      - bash 11-otel-operator/validate.sh
      - bash 20-kafka-cluster/bootstrap.sh
      - bash 20-minio/bootstrap.sh
      - bash 20-mysql/bootstrap.sh
      - bash 20-jaeger-thanos/bootstrap.sh
      - bash 20-jaeger-trino/bootstrap.sh
      - bash 20-polaris-db/bootstrap.sh
      - bash 20-kafka-cluster/validate.sh
      - bash 20-minio/validate.sh
      - bash 20-mysql/validate.sh
      - bash 20-jaeger-thanos/validate.sh
      - bash 20-jaeger-trino/validate.sh
      - bash 20-polaris-db/validate.sh
      - bash 21-polaris/bootstrap.sh
      - bash 21-polaris/validate.sh
      - bash 21-kafka-debezium-mysql-connector/bootstrap.sh
      - bash 21-kafka-debezium-mysql-connector/validate.sh
      - bash 22-kafka-iceberg-connector/bootstrap.sh
      - bash 22-kafka-iceberg-connector/validate.sh
      - bash 23-trino/bootstrap.sh
      - bash 23-trino/validate.sh

  bootstrap-by-argocd:
    internal: true
    requires:
      vars:
        - name: KUBE_CONTEXT
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash platform/00-argocd/bootstrap.sh
      - bash platform/00-argocd/validate.sh
      - bash platform/01-argocd-health-checks/patch.sh
      - bash platform/02-argocd-apps/bootstrap.sh
      - bash platform/02-argocd-apps/validate.sh

  validate:
    desc: "Validate all K8s apps in parallel"
    requires:
      vars:
        - name: KUBE_CONTEXT
    deps:
      - task: validate-cert-manager
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kube-prometheus
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-strimzi-operator
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-keda
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-spark-operator
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-otel-operator
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kafka-cluster
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-minio
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-mysql
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-jaeger-thanos
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-jaeger-trino
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kafka-debezium-mysql-connector
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-kafka-iceberg-connector
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-trino
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-polaris-db
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"
      - task: validate-polaris
        vars:
          KUBE_CONTEXT: "{{.KUBE_CONTEXT}}"

  validate-cert-manager:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 10-cert-manager/validate.sh

  validate-kube-prometheus:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 10-kube-prometheus/validate.sh

  validate-strimzi-operator:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 10-strimzi-operator/validate.sh

  validate-keda:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 11-keda/validate.sh

  validate-spark-operator:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 11-spark-operator/validate.sh

  validate-otel-operator:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 11-otel-operator/validate.sh

  validate-kafka-cluster:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-kafka-cluster/validate.sh

  validate-minio:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-minio/validate.sh

  validate-mysql:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-mysql/validate.sh

  validate-jaeger-thanos:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-jaeger-thanos/validate.sh

  validate-jaeger-trino:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-jaeger-trino/validate.sh

  validate-kafka-debezium-mysql-connector:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 21-kafka-debezium-mysql-connector/validate.sh

  validate-kafka-iceberg-connector:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 22-kafka-iceberg-connector/validate.sh

  validate-trino:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 23-trino/validate.sh

  validate-polaris-db:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 20-polaris-db/validate.sh

  validate-polaris:
    internal: true
    env:
      KUBE_CONTEXT: '{{.KUBE_CONTEXT}}'
    cmds:
      - bash 21-polaris/validate.sh
